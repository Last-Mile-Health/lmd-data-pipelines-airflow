# ═══════════════════════════════════════════════════════════
# OKR Dashboard Pipeline — Redshift SQL Transforms → Extract → RDS (PostgreSQL)
# ═══════════════════════════════════════════════════════════

pipeline:
  name: lib_okr_dashboard_pipeline
  description: "Refreshes Redshift views via SQL transforms, then copies OKR data to RDS PostgreSQL for the Liberia OKR dashboard"
  owner: "LMD"
  tags: ["okr", "liberia", "redshift-to-rds"]
  dag_type: okr_redshift_to_rds

# ── Source: Redshift Views ──
source:
  type: redshift
  views:
    - database: liberia
      schema: public
      view: ifi_kpi_dashboard_vw
      target_table: ifi_kpi_dashboard_vw
    # - database: liberia
    #   schema: public
    #   view: vw_okr_example_2
    #   target_table: okr_example_2

# ── Target: RDS PostgreSQL ──
target:
  type: rds_postgres
  secret_name: TODO_RDS_SECRET_NAME              # secret contains: username, password
  writer_endpoint: TODO_WRITER_ENDPOINT          # e.g. mydb.cluster-xxx.us-east-1.rds.amazonaws.com
  reader_endpoint: TODO_READER_ENDPOINT          # e.g. mydb.cluster-ro-xxx.us-east-1.rds.amazonaws.com
  port: 5432
  dbname: postgres
  schema: public
  write_mode: replace                          # replace = TRUNCATE + INSERT

# ── Redshift Connection ──
redshift:
  database: liberia

# ── Transforms (SQL files executed on Redshift before extraction) ──
transforms:
  sql_dir: sql/okr_transforms                 # directory containing .sql files
  # select: example_1                         # optional: filter to specific SQL files

# ── Schedule ──
schedule:
  cron: "0 6 * * *"                            # Daily at 6 AM UTC
  catchup: false
  retries: 2
  retry_delay_minutes: 5
  timeout_minutes: 60

# ── Alerts ──
alerts:
  email_on_start: true
  email_on_failure: true
  email_on_retry: false
  email_recipients:
    - jdunyo@lastmilehealth.org
    - lmdadmin@lastmilehealth.org
