# ═══════════════════════════════════════════════════════════
# IFI Pipeline — Implementation Fidelity  (Kobo)
# ═══════════════════════════════════════════════════════════

pipeline:
  name: lib_ifi_pipeline
  description: "Implementation Fidelity  from Kobo Toolbox"
  owner: "LMD"
  tags: ["kobo", "ifi", "liberia"]

# ── Data Source ──
source:
  type: kobo_api
  secret_name: lmd-dev-kobo-secrets
  config:
    form_id: "aUEoTMLrdyEvE9eYc2jRAV"
    export_format: json
    base_url_key: KOBO_API_URL        # key within the secret
    auth_token_key: KOBO_API_TOKEN    # key within the secret
    default_country: liberia

# ── Ingestion Mode ──
ingestion:
  mode: incremental                    # full | incremental
  incremental_key: "_submission_time"  # column used for watermark
  partition_by:
    - country
    - year
    - month
    - day

# ── Raw Layer (Raw JSON in S3) ──
raw:
  format: json
  # path built dynamically: {bucket}/{country}/{pipeline}/{YYYY}/{MM}/{DD}/{batch_id}/

# ── Processed Layer (Cleaned Parquet in S3) ──
processed:
  glue_job_script: glue_jobs/lib_ifi_pipeline/raw_to_processed.py
  custom_sql: sql/raw_to_processed/lib_ifi_pipeline_clean.sql
  deduplicate_key: "_id"

# ── Curated Layer (Business Logic → Redshift) ──
curated:
  glue_job_script: glue_jobs/lib_ifi_pipeline/processed_to_curated.py
  custom_sql: sql/processed_to_curated/lib_ifi_pipeline_transform.sql

# ── Redshift Load ──
redshift:
  database: liberia                    # country-specific Redshift database
  schema: public
  table: lib_ifi_community_data         
  load_mode: merge                     # replace | append | merge
  merge_keys: ["_id"]
  distribution_key: "_id"
  sort_keys: ["_submission_time"]
  pre_sql: null
  post_sql:
    - sql/redshift/views/lib_ifi_vw_kpi_report.sql
    - sql/redshift/views/lib_ifi_vw_kpi_fyq_report.sql
    - sql/redshift/views/lib_ifi_okr_monthly_report.sql

# ── Schedule ──
schedule:
  cron: "0 6 * * 0"                    # Every Sunday at 6 AM UTC
  catchup: false
  retries: 2
  retry_delay_minutes: 5
  timeout_minutes: 120

# ── Data Quality Checks ──
quality_checks:
  - type: row_count_min
    threshold: 10
  - type: null_check
    columns: ["_id"]

# ── Alerts ──
alerts:
  email_on_start: true
  email_on_failure: true
  email_on_retry: false
  email_recipients:
    - jdunyo@lastmilehealth.org          # add your actual email addresses
    - lmdadmin@lastmilehealth.org
  on_sla_miss: []
