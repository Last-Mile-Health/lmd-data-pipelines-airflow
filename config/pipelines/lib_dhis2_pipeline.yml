# ═══════════════════════════════════════════════════════════
# DHIS2 Pipeline — DataValueSets (Liberia)
# ═══════════════════════════════════════════════════════════

pipeline:
  name: lib_dhis2_pipeline
  description: "DHIS2 DataValueSets from Liberia DHIS2 instance"
  owner: "LMD"
  tags: ["dhis2", "liberia", "routine"]
  dag_type: dhis2                              # handled by dedicated dhis2_etl_dag.py

# ── Data Source ──
source:
  type: dhis2
  secret_name: lmd-dev-dhis2-secrets
  config:
    # Credentials come from the secret: DHIS2_USERNAME, DHIS2_PASSWORD, DHIS2_BASE_URL
    auth_type: basic
    endpoint: /dataValueSets
    params:
      dataSet: "dUjJetW69xZ"               # e.g. "BfMAe6Itzgt"
      period: "202601"                     # e.g. "2026Q1", "202601", "2026"
      orgUnit: "LHNiyIWuLdc"               # e.g. "ImspTQPwCqd" (root org unit)
      children: true                       # include child org units
    page_size: 1000
    default_country: liberia

# ── Ingestion Mode ──
ingestion:
  mode: incremental                               # full | incremental
  cdc_strategy: rolling_window                    # full | incremental | rolling_window
  incremental_key: "lastUpdated"                  # used by 'incremental' strategy
  rolling_window_months: 3                        # used by 'rolling_window' strategy
  partition_by:
    - country
    - year
    - month
    - day

# ── Raw Layer (Raw JSON in S3) ──
raw:
  format: json

# ── Processed Layer (Cleaned Parquet in S3) ──
processed:
  glue_job_script: glue_jobs/lib_dhis2_pipeline/raw_to_processed.py
  custom_sql: sql/raw_to_processed/lib_dhis2_pipeline_clean.sql
  deduplicate_key: null                    # set to a unique key if duplicates are possible

# ── Curated Layer (Business Logic → Redshift) ──
curated:
  glue_job_script: glue_jobs/lib_dhis2_pipeline/processed_to_curated.py
  custom_sql: sql/processed_to_curated/lib_dhis2_pipeline_transform.sql

# ── Dimension Tables ──
dimensions:
  - name: dhis2_dim_dataelement
    endpoint: /dataElements
    response_key: dataElements
    fields: "id,displayName,shortName,categoryCombo[id,displayName]"
    table: dhis2_dim_dataelement
    schema: public
    columns:
      - {name: id, type: "VARCHAR(64)", is_key: true}
      - {name: displayname, type: "VARCHAR(512)"}
      - {name: shortname, type: "VARCHAR(512)"}
      - {name: categorycombo_id, type: "VARCHAR(64)"}
      - {name: categorycombo_displayname, type: "VARCHAR(512)"}

  - name: dhis2_dim_orgunit
    endpoint: /organisationUnits
    response_key: organisationUnits
    fields: "id,displayName,shortName,level,path,parent[id,displayName]"
    table: dhis2_dim_orgunit
    schema: public
    columns:
      - {name: id, type: "VARCHAR(64)", is_key: true}
      - {name: displayname, type: "VARCHAR(512)"}
      - {name: shortname, type: "VARCHAR(512)"}
      - {name: level, type: "INTEGER"}
      - {name: path, type: "VARCHAR(2048)"}
      - {name: parent_id, type: "VARCHAR(64)"}
      - {name: parent_displayname, type: "VARCHAR(512)"}

  - name: dhis2_dim_category_option
    endpoint: /categoryOptionCombos
    response_key: categoryOptionCombos
    fields: "id,displayName"
    table: dhis2_dim_category_option
    schema: public
    columns:
      - {name: id, type: "VARCHAR(64)", is_key: true}
      - {name: displayname, type: "VARCHAR(512)"}

  - name: dhis2_dim_attribute_option
    endpoint: /categoryOptionCombos
    response_key: categoryOptionCombos
    fields: "id,displayName"
    table: dhis2_dim_attribute_option
    schema: public
    columns:
      - {name: id, type: "VARCHAR(64)", is_key: true}
      - {name: displayname, type: "VARCHAR(512)"}

# ── Redshift Load ──
redshift:
  database: liberia
  schema: public
  table: dhis2_data_values
  load_mode: merge                         # replace | append | merge
  merge_keys: ["dataelement", "period", "orgunit", "categoryoptioncombo", "attributeoptioncombo"]
  distribution_style: AUTO
  distribution_key: null
  sort_keys: ["period", "dataelement", "orgunit"]
  pre_sql: null
  post_sql: sql/redshift/views/lib_dhis2_vw_bi_datavalue.sql

# ── Schedule ──
schedule:
  cron: "0 7 * * *"                        # Daily at 7 AM UTC
  catchup: false
  retries: 2
  retry_delay_minutes: 5
  timeout_minutes: 120

# ── Data Quality Checks ──
quality_checks:
  - type: row_count_min
    threshold: 1

# ── Alerts ──
alerts:
  email_on_start: true
  email_on_failure: true
  email_on_retry: false
  email_recipients:
    - jdunyo@lastmilehealth.org
    - lmdadmin@lastmilehealth.org
  on_sla_miss: []
